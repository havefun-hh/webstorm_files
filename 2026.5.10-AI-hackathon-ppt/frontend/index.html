<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>「1+N」研发提效方案 - AI黑客松</title>
    <!-- Font imports (dynamically inserted based on configuration) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Inter:wght@300;400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00D4FF;
            --accent-color-1: #6C63FF;
            --accent-color-2: #00FF88;
            --neutral-color: #8892A4;
            --slide-background: linear-gradient(135deg, #0A1628 0%, #0D1F3C 50%, #0A1628 100%);
            --font-title: 'Montserrat', 'Noto Sans SC', sans-serif;
            --font-body: 'Inter', 'Noto Sans SC', sans-serif;
        }
    </style>
    <style>
        .nav-btn, .page-indicator {
            display: none;
        }
        .fullscreen-btn, .slide-sidebar {
            display: none;
        }
    </style>
    <script>
        // # 禁止修改
        window.slideDataMap = new Map();
    </script>
</head>
<body>
    <!-- PPT 容器 -->
    <div class="ppt-container edit-mode">
        <!-- 导航按钮 -->
        <button class="nav-btn nav-btn-prev" id="prevBtn" aria-label="上一页">
            ←
        </button>
        <button class="nav-btn nav-btn-next" id="nextBtn" aria-label="下一页">
            →
        </button>

        <!-- 进度条 -->
        <div class="progress-bar">
            <div class="progress-bar-fill" id="progressBarFill"></div>
        </div>

        <!-- 页码指示器 -->
        <div class="page-indicator" id="pageIndicator">
            1 / 1
        </div>

        <!-- 全屏切换按钮 -->
        <button class="fullscreen-btn" id="fullscreenBtn" aria-label="全屏演示">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 3 21 3 21 9"></polyline>
                <polyline points="9 21 3 21 3 15"></polyline>
                <line x1="21" y1="3" x2="14" y2="10"></line>
                <line x1="3" y1="21" x2="10" y2="14"></line>
            </svg>
        </button>
        <!-- 缩略图侧栏 -->
        <div class="slide-sidebar" id="slideSidebar">
            <!-- 缩略图由 JS 动态生成 -->
        </div>
        <div class="ppt-viewport" id="ppt-viewport">
            <!-- 幻灯片将由 JavaScript 动态插入 -->
        </div>
    </div>
    
    <!-- Vite Main Entry -->
    <script type="module" src="/src/main.js"></script>

    <!--  开始加载slide-N.js区域 -->
    <!-- <script type="module" src="/src/slides/slide-{N}.js"></script> -->
    <!--  结束加载slide-N.js区域 -->
    <script type="module" src="/src/slides/slide-1.js"></script>
      <script type="module" src="/src/slides/slide-2.js"></script>
      <script type="module" src="/src/slides/slide-3.js"></script>
      <script type="module" src="/src/slides/slide-4.js"></script>
      <script type="module" src="/src/slides/slide-5.js"></script>
      <script type="module" src="/src/slides/slide-6.js"></script>
      <script type="module" src="/src/slides/slide-7.js"></script>
      <script type="module" src="/src/slides/slide-8.js"></script>
      <script type="module" src="/src/slides/slide-9.js"></script>
      <script type="module" src="/src/slides/slide-10.js"></script>
      <script type="module" src="/src/slides/slide-11.js"></script>
      <script type="module" src="/src/slides/slide-12.js"></script>
      <script type="module" src="/src/slides/slide-13.js"></script>
      <script type="module" src="/src/slides/slide-14.js"></script>
      <script type="module" src="/src/slides/slide-15.js"></script>
  </body>
</html>
